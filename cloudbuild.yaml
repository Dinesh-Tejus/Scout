steps:
  # ── Build frontend ──────────────────────────────────────────────────────────
  - name: node:20-slim
    id: build-frontend
    entrypoint: bash
    args:
      - -c
      - |
        cd frontend
        npm ci
        npm run build
        mkdir -p ../backend/static
        cp -r dist/. ../backend/static/

  # ── Build Docker image ──────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-image
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/scout:$COMMIT_SHA
      - -t
      - gcr.io/$PROJECT_ID/scout:latest
      - backend/
    waitFor: [build-frontend]

  # ── Push image ──────────────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push-image
    args:
      - push
      - --all-tags
      - gcr.io/$PROJECT_ID/scout
    waitFor: [build-image]

  # ── Deploy to Cloud Run ─────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/gcloud
    id: deploy
    args:
      - run
      - deploy
      - scout
      - --image=gcr.io/$PROJECT_ID/scout:$COMMIT_SHA
      - --region=us-east1
      - --platform=managed
      - --allow-unauthenticated
      - --set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest,TAVILY_API_KEY=TAVILY_API_KEY:latest,PARALLEL_API_KEY=PARALLEL_API_KEY:latest
      - --set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID,FIRESTORE_DATABASE=(default)
      - --timeout=3600
      - --concurrency=80
      - --min-instances=0
      - --max-instances=10
    waitFor: [push-image]

images:
  - gcr.io/$PROJECT_ID/scout:$COMMIT_SHA
  - gcr.io/$PROJECT_ID/scout:latest

options:
  logging: CLOUD_LOGGING_ONLY
